name: Bug Report
description: Report a bug in the Cyber Security Test Pipeline
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the pipeline are you running?
      placeholder: e.g., 2.0.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Core Pipeline (src/pipeline)
        - Recon (src/recon)
        - Analysis (src/analysis)
        - Detection (src/detection)
        - Exploitation (src/exploitation)
        - Fuzzing (src/fuzzing)
        - Execution (src/execution)
        - Reporting (src/reporting)
        - Dashboard (src/dashboard)
        - Infrastructure (src/infrastructure)
        - Learning (src/learning)
        - Intelligence (src/intelligence)
        - CI/CD
        - Docker/Kubernetes
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure '...'
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your pipeline configuration (redact sensitive values)
      render: json
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
