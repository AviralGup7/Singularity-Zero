global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cyber-dashboard'
    static_configs:
      - targets: ['dashboard:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
