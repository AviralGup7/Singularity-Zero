# ──────────────────────────────────────────────────────────────────────
# Ingress for Cyber Security Test Pipeline
# Routes external traffic to the dashboard service
# ──────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyber-pipeline-ingress
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: cyber-pipeline
    app.kubernetes.io/component: ingress
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # SECURITY: tighten proxy timeouts from 3600s to 60s. The 1-hour
    # timeout allowed slow-loris style exhaustion attacks. The 60s value
    # is more than enough for the dashboard's API calls and WebSocket
    # upgrades (which use a separate wss-connection-timeout).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # WebSocket support and TLS configuration (snippets disabled for CVE-2021-25742 compliance)
    # TLS configuration
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    # WAF (ModSecurity) - enable if ingress controller supports it
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRule REQUEST_URI "@beginsWith /api/" "id:1001,phase:1,pass,nolog,setvar:tx.paranoia_level=1"
      SecRule REQUEST_URI "@beginsWith /ws" "id:1002,phase:1,pass,nolog,setvar:tx.paranoia_level=1"
spec:
  ingressClassName: ingress-nginx
  tls:
    - hosts:
        - pipeline.example.com
      secretName: cyber-pipeline-tls
  rules:
    - host: pipeline.example.com
      http:
        paths:
          # WebSocket endpoint
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: cyber-dashboard
                port:
                  number: 8000
          # API endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cyber-dashboard
                port:
                  number: 8000
          # Prometheus metrics (internal-only; scraped via ServiceMonitor, not exposed via Ingress)
          # REMOVED from public Ingress to prevent architecture detail leaks.
          # Health check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: cyber-dashboard
                port:
                  number: 8000
          # Static files
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: cyber-dashboard
                port:
                  number: 8000
          # Default route
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyber-dashboard
                port:
                  number: 8000
---
# ──────────────────────────────────────────────────────────────────────
# Network Policy - Restrict access to dashboard
# ──────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cyber-dashboard-network-policy
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: cyber-pipeline
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cyber-pipeline
      app.kubernetes.io/component: dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow from within the same namespace (for internal services)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cyber-pipeline
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow external HTTP/HTTPS (for security scanning)
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
---
# ──────────────────────────────────────────────────────────────────────
# Network Policy - Restrict access to workers
# ──────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cyber-worker-network-policy
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: cyber-pipeline
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cyber-pipeline
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from Prometheus
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8001
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow external HTTP/HTTPS (for security scanning)
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
