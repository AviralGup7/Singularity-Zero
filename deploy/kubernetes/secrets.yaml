# ──────────────────────────────────────────────────────────────────────
# Secrets for Cyber Security Test Pipeline
#
# SECURITY WARNING: This file MUST NOT be committed to version control
# with real secret values. Base64 is NOT encryption.
#
# RECOMMENDED: Use an external secrets operator (e.g. External Secrets
# Operator with HashiCorp Vault, AWS Secrets Manager, or GCP Secret Manager)
# so that plaintext secrets never appear in git history.
#
# To generate a strong key:  python -c "import secrets; print(secrets.token_urlsafe(48))"
# Then base64-encode it:     echo -n '<key>' | base64
#
# The placeholder values below WILL be rejected at runtime by the
# application (APP_SECRET_KEY='change-me-in-production' raises ValueError
# when APP_ENV=production). Replace them before deploying.
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cyber-pipeline-secrets
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: cyber-pipeline
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # REPLACE BEFORE DEPLOYING: echo -n '<strong-random-key>' | base64
  APP_SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_SECRET
  REDIS_PASSWORD: REPLACE_WITH_BASE64_ENCODED_SECRET
  REDIS_SENTINEL_PASSWORD: REPLACE_WITH_BASE64_ENCODED_SECRET
