# ──────────────────────────────────────────────────────────────────────
# Secrets for Cyber Security Test Pipeline
#
# SECURITY WARNING: This file MUST NOT be committed to version control
# with real secret values. Base64 is NOT encryption.
#
# RECOMMENDED: Use an external secrets operator (e.g. External Secrets
# Operator with HashiCorp Vault, AWS Secrets Manager, or GCP Secret Manager)
# so that plaintext secrets never appear in git history.
#
# To generate a strong key:  python -c "import secrets; print(secrets.token_urlsafe(48))"
# Then base64-encode it:     echo -n '<key>' | base64
#
# The placeholder values below WILL be rejected at runtime by the
# application (see ``src.core.security.secret_validator``): the
# ``APP_SECRET_KEY`` is checked on dashboard startup, the pipeline CLI
# startup, and the worker startup. The values must be replaced before
# the deployment is even attempted.
#
# Pre-deploy sanity check (run in CI):
#   ! grep -E 'REPLACE_WITH_|CHANGE_ME' deploy/kubernetes/secrets.yaml
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cyber-pipeline-secrets
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: cyber-pipeline
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # REPLACE BEFORE DEPLOYING. The literal value (not the base64) is
  # checked at startup by ``secret_validator``. Use:
  #   python -c "import secrets; print(secrets.token_urlsafe(48))"
  APP_SECRET_KEY: "REPLACE_WITH_STRONG_RANDOM_SECRET_48_BYTES"
  REDIS_PASSWORD: "REPLACE_WITH_STRONG_RANDOM_PASSWORD_32_CHARS"
  REDIS_SENTINEL_PASSWORD: "REPLACE_WITH_STRONG_RANDOM_PASSWORD_32_CHARS"
