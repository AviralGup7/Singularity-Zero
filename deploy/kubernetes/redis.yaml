# ──────────────────────────────────────────────────────────────────────
# Redis StatefulSet for Cyber Security Test Pipeline
# Production-grade Redis with master-replica architecture
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: database
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: redis
    redis-role: master
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replicas
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: replica
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: redis
    redis-role: replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: database
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: redis
          image: redis:7.6-alpine
          command:
            - "sh"
            - "-c"
            - |
              if [ "${POD_NAME}" = "redis-0" ]; then
                redis-server \
                  --bind 0.0.0.0 \
                  --port 6379 \
                  --requirepass ${REDIS_PASSWORD} \
                  --masterauth ${REDIS_PASSWORD} \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru \
                  --appendonly yes \
                  --appendfilename "appendonly.aof" \
                  --save 900 1 \
                  --save 300 10 \
                  --save 60 10000
              else
                redis-server \
                  --bind 0.0.0.0 \
                  --port 6379 \
                  --requirepass ${REDIS_PASSWORD} \
                  --masterauth ${REDIS_PASSWORD} \
                  --replicaof redis-0.redis-headless.cyber-pipeline.svc.cluster.local 6379 \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru \
                  --appendonly yes \
                  --appendfilename "appendonly.aof" \
                  --replica-read-only yes
              fi
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-pipeline-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: standard
