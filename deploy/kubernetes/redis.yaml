# ──────────────────────────────────────────────────────────────────────
# Redis StatefulSet for Cyber Security Test Pipeline
# Production-grade Redis with master-replica architecture
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: database
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: redis
    redis-role: master
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replicas
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: replica
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: redis
    redis-role: replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: database
  annotations:
    checkov.io/skip1: CKV_K8S_35=Prefer using secrets as files over secrets as environment variables
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.2.4-alpine@sha256:d894e43eb91176b6d4b29bb88de47ab188849b251121d55639148d424b9c1d68
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          imagePullPolicy: Always
          command:
            - "sh"
            - "-c"
            - |
              if [ "${POD_NAME}" = "redis-0" ]; then
                redis-server \
                  --bind 0.0.0.0 \
                  --port 6379 \
                  --requirepass ${REDIS_PASSWORD} \
                  --masterauth ${REDIS_PASSWORD} \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru \
                  --appendonly yes \
                  --appendfilename "appendonly.aof" \
                  --save 900 1 \
                  --save 300 10 \
                  --save 60 10000
              else
                redis-server \
                  --bind 0.0.0.0 \
                  --port 6379 \
                  --requirepass ${REDIS_PASSWORD} \
                  --masterauth ${REDIS_PASSWORD} \
                  --replicaof redis-0.redis-headless.cyber-pipeline.svc.cluster.local 6379 \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru \
                  --appendonly yes \
                  --appendfilename "appendonly.aof" \
                  --replica-read-only yes
              fi
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-pipeline-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: standard
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: cyber-pipeline
  labels:
    app.kubernetes.io/name: redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the same namespace (dashboard and workers)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cyber-pipeline
      ports:
        - protocol: TCP
          port: 6379
    # Allow from redis pods for replication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow replication communication to other redis pods
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
