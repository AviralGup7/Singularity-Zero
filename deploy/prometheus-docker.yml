# Prometheus configuration for Cyber Security Test Pipeline
# Mounted as /etc/prometheus/prometheus.yml in the container

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: cyber-security-pipeline
    environment: production

rule_files: []

scrape_configs:
  # ──────────────────────────────────────────────────────────────────────
  # Prometheus self-monitoring
  # ──────────────────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: prometheus
          service: prometheus
    scrape_interval: 30s

  # ──────────────────────────────────────────────────────────────────────
  # Redis metrics via redis_exporter
  # ──────────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          instance: redis
          service: cache

  # ──────────────────────────────────────────────────────────────────────
  # FastAPI Dashboard metrics
  # ──────────────────────────────────────────────────────────────────────
  - job_name: dashboard
    metrics_path: /metrics
    static_configs:
      - targets: ['dashboard:8000']
        labels:
          instance: dashboard
          service: api
    scrape_interval: 10s

  # ──────────────────────────────────────────────────────────────────────
  # Queue Worker metrics
  # ──────────────────────────────────────────────────────────────────────
  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:8001']
        labels:
          instance: worker
          service: worker
    scrape_interval: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: 'worker:\d+'
        replacement: '${1}'

  # ──────────────────────────────────────────────────────────────────────
  # Docker daemon metrics (optional - requires Docker metrics enabled)
  # ──────────────────────────────────────────────────────────────────────
  # - job_name: docker
  #   static_configs:
  #     - targets: ['docker-host:9323']
  #       labels:
  #         instance: docker-host
  #         service: docker

  # ──────────────────────────────────────────────────────────────────────
  # Node Exporter for host metrics (optional - requires node_exporter)
  # ──────────────────────────────────────────────────────────────────────
  # - job_name: node-exporter
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         instance: host
  #         service: node

  # ──────────────────────────────────────────────────────────────────────
  # cAdvisor container metrics (optional)
  # ──────────────────────────────────────────────────────────────────────
  # - job_name: cadvisor
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         instance: cadvisor
  #         service: containers
  #   metric_relabel_configs:
  #     - source_labels: [container_label_com_docker_compose_service]
  #       regex: ''
  #       action: drop

  # ──────────────────────────────────────────────────────────────────────
  # cAdvisor container metrics (optional)
  # ──────────────────────────────────────────────────────────────────────
