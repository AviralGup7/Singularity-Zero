apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyber-pipeline.fullname" . }}
  labels:
    {{- include "cyber-pipeline.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cyber-pipeline.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
      labels:
        {{- include "cyber-pipeline.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cyber-pipeline.serviceAccountName" . }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["cyber-dashboard-fastapi"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "cyber-pipeline.fullname" . }}-config
            - secretRef:
                name: {{ include "cyber-pipeline.fullname" . }}-secrets
          env:
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyber-pipeline.fullname" . }}-secrets
                  key: app-secret-key
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyber-pipeline.fullname" . }}-secrets
                  key: redis-password
            - name: REDIS_URL
              value: "redis://redis-master:6379/0"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["cyber-worker"]
          envFrom:
            - configMapRef:
                name: {{ include "cyber-pipeline.fullname" . }}-config
            - secretRef:
                name: {{ include "cyber-pipeline.fullname" . }}-secrets
          env:
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyber-pipeline.fullname" . }}-secrets
                  key: app-secret-key
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyber-pipeline.fullname" . }}-secrets
                  key: redis-password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
