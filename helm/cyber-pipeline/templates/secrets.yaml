apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyber-pipeline.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cyber-pipeline.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq .Values.config.appSecretKey "" }}
  {{- fail "SECURITY ERROR: config.appSecretKey must be set to a strong random value before deploying. Generate one with: python -c 'import secrets; print(secrets.token_hex(32))'" }}
  {{- end }}
  {{- if hasPrefix "REPLACE_WITH_" .Values.config.appSecretKey }}
  {{- fail "SECURITY ERROR: config.appSecretKey still contains a REPLACE_WITH_ placeholder. Set a real value." }}
  {{- end }}
  app-secret-key: {{ .Values.config.appSecretKey | b64enc | quote }}
  {{- if and .Values.redis.auth.existingSecret .Values.redis.auth.existingSecretPasswordKey }}
  {{- else if .Values.config.redisPassword }}
  redis-password: {{ .Values.config.redisPassword | b64enc | quote }}
  redis-url: {{ printf "redis://:%s@redis-master:6379/0" .Values.config.redisPassword | b64enc | quote }}
  {{- else }}
  {{- fail "SECURITY ERROR: redis password is required. Set redis.auth.existingSecret/existingSecretPasswordKey or config.redisPassword before deploying." }}
  {{- end }}
