apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyber-pipeline.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cyber-pipeline.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq .Values.config.appSecretKey "" }}
  {{- fail "SECURITY ERROR: config.appSecretKey must be set to a strong random value before deploying. Generate one with: python -c 'import secrets; print(secrets.token_hex(32))'" }}
  {{- end }}
  app-secret-key: {{ .Values.config.appSecretKey | b64enc | quote }}
