{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cyber-pipeline.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cyber-pipeline.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "8Gi" }}
  storageClassName: {{ .Values.persistence.storageClassName | default "" }}
{{- end }}
