replicaCount: 1

image:
  repository: ghcr.io/YOUR_GITHUB_ORG/cyber-security-test-pipeline  # REQUIRED: Replace with your GitHub org before deploying
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  # Security Fix: Enable read-only root filesystem to limit container breakout impact.
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cyber-pipeline.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  size: 8Gi
  storageClassName: ""

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi

config:
  # SECURITY: Override with a strong random key before any deployment.
  # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
  # Leaving this empty will cause the application to FAIL on startup in production.
  appSecretKey: ""
  redisPassword: ""
  appEnv: "production"
  appDebug: "false"
  corsOrigins: ""
  databaseUrl: "sqlite:///data/pipeline.db"
  rateLimitRps: "10"
  scopeFile: "/app/configs/scope.txt"
  enableExploitation: "false"
  enableLearning: "true"
  enableNotifications: "false"
  enableThreatIntel: "false"

observability:
  prometheus:
    enabled: true
    port: 9090
  redis:
    password: ""
  grafana:
    enabled: true
    adminUser: "admin"
    # SECURITY: Generate with: python -c "import secrets; print(secrets.token_urlsafe(16))"
    # Leaving this empty causes the helm chart to fail at template render
    # time, so deployments cannot accidentally ship with Grafana's default
    # credentials. Set this value in your environment-specific values file.
    adminPassword: ""
  jaeger:
    enabled: true
    otlpEndpoint: "http://jaeger:4317"
